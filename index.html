<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>个人主页</title>
    <style type="text/css">
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-image: url("img/7703.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .box {
            width: 90%;
            max-width: 900px; 
            margin: 50px auto; 
            background-color: rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 40px;
            transition: all 0.3s ease;
        }

        .box:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .box ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .box li a {
            text-decoration: none;
            color: #333;
            font-size: 20px;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .box li a:hover {
            color: #fff;
            background: #409eff;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            transform: scale(1.05);
        }

        /* 图片居中 + 动画效果 */
        .img-box{
            text-align: center;
            margin: 30px auto;
            width: 90%;
            max-width: 400px;
        }

        .img-box img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .img-box img:hover{
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>
    <div class="box">
        <ul>
            <li><a href="关于我.html">关于我</a></li>
            <li><a href="656.html">精选作品</a></li>
            <li><a href="思考笔记.html">思考笔记</a></li>
            <li><a href="联系我22.html">联系我</a></li>
        </ul>
    </div>

    <div class="img-box">
        <img src="img/4I_U-hqwsysy9914734.png" />
    </div>
</body>
