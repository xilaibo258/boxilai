<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>联系我</title>
    <style type="text/css">
        body{
            margin: 0;
            padding: 0;
            background-image: url("img/7703.jpg");
            background-size: cover;
        }
        .container{
            width: 1000px;
            margin: 80px auto;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 70px;
            border-radius: 50px;
            box-shadow: rgba(0,0,0);
        }
		h1{
			text-align: center;
			font-size: 3.125rem;
		}
		.yinyan{text-align: center;
		font-size: 1.25rem;
		color: aliceblue;
		margin-bottom: 1.875rem;	
		}
		form{
			width:100%;
			
		}
		label{
			font-size: 1.875rem;
			font-family: 'Courier New', Courier, monospace;
			display: block;
			margin-bottom: 0.625rem;
			
		}
		input{
			width: 100%;
			height: 3.75rem;
			border-radius: 0.625rem;
			margin-bottom: 1.25rem;
			background-color: #55455;
			font-size: 1.5625rem;
			padding: 1.25rem;
			border: none;
			outline: none;
		}
		textarea{
			width: 100%;
			height: 9.375rem;
			border-radius: 0.625rem;
			margin-bottom: 1.25rem;
			background-color: aliceblue;
			font-size: 1.5625rem;
			padding: 1.25rem;
			border: none;
			outline: none;
			font-family: 'Courier New', Courier, monospace;

		}
		button{
		    width: 100%;
		    height: 50px;
		    background-color: #333;
		    font-size: 30px;
		    color: white;
		    border-radius: 10px;
		    border: none; 
		    outline: none;
		}
		button{
			background-color: #333;
			
		}
		.contact{
			text-align: center;
			margin-top: 4.375rem;
			font-size: 1.25rem;
			font-family: 'Courier New', Courier, monospace;
			color: #55111;
		}
    </style>
</head>
<body>
    <div class="container">
        <h1>联系我</h1>
        <p class="yinyan">如果您对我的作品感兴趣，
            欢迎通过以下方式与我联系。
        </p>
        <form name="lianxi">
            <label>姓名</label>
            <input type="text" placeholder="请输入您的名字"/>
            <label>邮箱</label>
            <input type="email" placeholder="请输入您的邮箱"/>
            <label>留言内容</label>
            <textarea placeholder="请输入留言内容"></textarea>
            <button>发送信息</button>
        </form>
        <div class="contact">
            <p>邮箱：123456@qq.com</p>
            <p>电话：123-456-789</p>
            <p>地址：山东省德州市齐河县旅游大道10号山东文化职业学院</p>
        </div>
    </div>
</body>
</html>
