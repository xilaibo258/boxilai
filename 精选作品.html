	<body>
		<h3>jin</h3>
		<div>
			<div>
				<div>
					<img src="img/30ca45bab8c9093c74d8422369100338.jpg" width="500">
				</div>
				<div>
					<p class="text">本作品拍摄于博物馆展厅，利用垂直的射灯光线与深色背景形成强烈对比，聚焦于良渚文化的代表性玉器（玉璧与玉环）。
		画面通过居中对称的构图，展现了古玉温润斑驳的质感与“以苍璧礼天”的庄重气韵。
		光影的交织不仅凸显了文物的历史厚重感，也赋予了画面一种静谧而神圣的艺术美感。</p>
				</div>
			</div>
			<div>
				<div>
					<img src="img/eafa6f9f52f4ff668bcb638f5c2b9043.jpg " width="500"/>
				</div>
				<div>
					<p>本作捕捉了壮丽的“火烧云”城市黄昏景观。
		画面以极具视觉冲击力的粉紫色晚霞为主导，
		绚烂的云层与冷峻的城市建筑群形成了强烈的冷暖对比与动静反差。</p>
				</div>
			</div>
		</div>
